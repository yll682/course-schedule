<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 课程表</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1890ff">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/style.css">
    <style>
        body { padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        /* ── 顶栏 ── */
        .page-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px;
        }
        .page-title { margin: 0; font-size: 1.25rem; flex: 1; }
        .user-label { font-size: 0.85rem; color: var(--c-muted); white-space: nowrap; }
        /* ── 卡片 ── */
        .card {
            background: var(--c-surface);
            border-radius: 8px; padding: 20px; margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .card-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 16px; padding-bottom: 10px;
            border-bottom: 1px solid var(--c-border-soft);
        }
        .card-header h2 { margin: 0; font-size: 0.95rem; }
        .badge {
            font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; font-weight: 600;
        }
        .badge-admin { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; }
        .badge-user  {
            background: var(--c-badge-user-bg);
            color: var(--c-badge-user-text);
            border: 1px solid var(--c-badge-user-bdr);
        }
        /* ── 字段 ── */
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 0.88rem; font-weight: 500; margin-bottom: 5px; }
        .field .hint { font-size: 0.76rem; color: var(--c-muted); margin-top: 4px; }
        .field input, .field select {
            width: 100%; padding: 8px 11px;
            border: 1px solid var(--c-border-input); border-radius: 6px;
            background: var(--c-input); color: var(--c-text); font-size: 0.92rem;
        }
        .field input:disabled {
            background: var(--c-disabled-bg);
            color: var(--c-disabled-text);
            cursor: not-allowed;
        }
        /* ── 按钮 ── */
        .actions { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
        .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 0.88rem; cursor: pointer; }
        .btn-primary { background: var(--c-primary); color: white; }
        .btn-primary:hover { opacity: 0.85; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-default {
            background: var(--c-input); color: var(--c-text);
            border: 1px solid var(--c-border-input);
        }
        .btn-default:hover { background: var(--c-hover); }
        .btn-danger { color: #ff4d4f; border-color: #ffa39e; }
        .btn-danger:hover { background: #fff1f0; }
        .save-status { font-size: 0.82rem; color: #52c41a; display: none; }
        .save-status.show { display: inline; }
        /* ── 分隔 ── */
        .section-title { font-size: 0.82rem; color: var(--c-muted); margin: 14px 0 8px; }
        /* ── 列表项 ── */
        .token-row {
            display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
            padding: 8px 10px;
            border: 1px solid var(--c-border-soft);
            border-radius: 6px; margin-bottom: 6px;
        }
        .user-row {
            padding: 10px; border: 1px solid var(--c-border-soft);
            border-radius: 6px; margin-bottom: 8px;
        }
        .user-row-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 4px; }
        .week-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
        .week-chip {
            padding: 2px 8px; font-size: 0.8rem;
            border: 1px solid var(--c-border-input);
            border-radius: 4px; cursor: pointer;
            background: var(--c-input); color: var(--c-text);
        }
        .week-chip:hover { background: #e6f4ff; border-color: #1890ff; color: #1890ff; }
        .advanced-toggle {
            width: 100%; display: flex; align-items: center; justify-content: space-between;
            gap: 12px; padding: 10px 12px; margin-top: 16px;
            border: 1px solid var(--c-border-soft); border-radius: 8px;
            background: var(--c-subtle); color: var(--c-text);
            cursor: pointer; font-size: 0.88rem; text-align: left;
        }
        .advanced-toggle:hover { background: var(--c-hover); }
        .advanced-panel {
            display: none; margin-top: 12px; padding: 14px;
            border: 1px solid var(--c-border-soft); border-radius: 8px;
            background: var(--c-subtle);
        }
        .advanced-panel.open { display: block; }
        .advanced-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }
        .advanced-summary { font-size: 0.78rem; color: var(--c-muted); }
    </style>
</head>
<body>
    <div class="container">

        <!-- ── 顶栏 ── -->
        <div class="page-header">
            <button class="btn btn-default" onclick="location.href='/'" style="padding:5px 12px">← 返回</button>
            <h1 class="page-title">⚙️ 设置</h1>
            <span class="user-label" id="user-info"></span>
        </div>

        <!-- ── 账户（所有用户）── -->
        <div class="card">
            <div class="card-header">
                <h2>账户</h2>
                <span class="badge badge-user">所有用户</span>
            </div>
            <div class="actions">
                <button class="btn btn-default" id="export-btn" onclick="exportSemester()">导出整学期课表</button>
                <button class="btn btn-default" onclick="clearLocalCache()">清空页面缓存</button>
                <button class="btn btn-default btn-danger" onclick="doLogout()">退出登录</button>
            </div>
            <div id="export-status" style="font-size:0.82rem;color:var(--c-muted);margin-top:8px;display:none"></div>
            <div id="cache-clear-status" style="font-size:0.82rem;color:#52c41a;margin-top:8px;display:none"></div>

            <button class="advanced-toggle" type="button" onclick="toggleAdvancedOptions()" aria-expanded="false" id="advanced-toggle">
                <span>
                    <strong>高级选项</strong>
                    <span class="advanced-summary">配置首页左上角按钮和截图尺寸</span>
                </span>
                <span id="advanced-toggle-icon">▾</span>
            </button>
            <div class="advanced-panel" id="advanced-panel">
                <div class="advanced-grid">
                    <div class="field" style="margin:0">
                        <label for="home-button-mode">左上角按钮</label>
                        <select id="home-button-mode" onchange="saveAdvancedOptions()">
                            <option value="back_to_week">回本周</option>
                            <option value="capture">截图</option>
                        </select>
                    </div>
                    <div class="field" style="margin:0">
                        <label for="capture-size-preset">截图尺寸</label>
                        <select id="capture-size-preset" onchange="saveAdvancedOptions()">
                            <option value="device">当前设备</option>
                            <option value="a4">A4 (595 x 842)</option>
                        </select>
                    </div>
                </div>
                <div class="hint">截图会按所选尺寸临时渲染当前课表页面并下载，设置仅保存在当前浏览器。</div>
                <div class="save-status" id="advanced-save-status" style="margin-top:10px">✓ 已保存</div>
            </div>
        </div>

        <!-- ── 分享码（所有用户）── -->
        <div class="card">
            <div class="card-header">
                <h2>分享码</h2>
                <span class="badge badge-user">所有用户</span>
            </div>

            <!-- 创建 -->
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px">
                <div class="field" style="margin:0;flex:1;min-width:110px">
                    <label>有效期</label>
                    <select id="share-expires">
                        <option value="1d">1 天</option>
                        <option value="7d" selected>7 天</option>
                        <option value="30d">30 天</option>
                        <option value="180d">半年</option>
                    </select>
                </div>
                <div class="field" style="margin:0;flex:1;min-width:70px">
                    <label>从第几周</label>
                    <input type="number" id="share-week-from" value="1" min="1" max="30">
                </div>
                <div class="field" style="margin:0;flex:1;min-width:70px">
                    <label>到第几周</label>
                    <input type="number" id="share-week-to" value="19" min="1" max="30">
                </div>
                <button class="btn btn-primary" onclick="createShare()" style="white-space:nowrap">生成分享码</button>
            </div>

            <!-- 生成结果 -->
            <div id="share-result" style="display:none;background:#f6ffed;border:1px solid #b7eb8f;border-radius:6px;padding:12px;margin-bottom:14px">
                <div style="font-size:0.82rem;color:#52c41a;margin-bottom:6px">✓ 分享码已生成</div>
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                    <code id="share-result-code" style="font-size:1.25rem;letter-spacing:4px;font-weight:bold"></code>
                    <button class="btn btn-default" style="padding:4px 10px;font-size:0.8rem" onclick="copyCode()">复制分享码</button>
                    <button class="btn btn-primary" style="padding:4px 10px;font-size:0.8rem" onclick="copyShareLink()">复制分享链接</button>
                </div>
                <div id="share-result-info" style="font-size:0.78rem;color:#999;margin-top:4px"></div>
            </div>

            <!-- 我的分享码列表 -->
            <div class="section-title" id="share-list-label">我的分享码</div>
            <div id="share-list">加载中...</div>
        </div>

        <!-- ── 后台抓取（管理员）── -->
        <div class="card" id="admin-card" style="display:none">
            <div class="card-header">
                <h2>后台抓取</h2>
                <span class="badge badge-admin">管理员</span>
            </div>
            <div class="field">
                <label>自动抓取间隔（分钟）</label>
                <input type="number" id="fetch_interval" value="60" min="5" max="1440" disabled>
                <div class="hint">后台定时为所有用户抓取上周、当周、下周课表。建议 30-120 分钟。</div>
            </div>
            <div class="field">
                <label>第3、4节特殊时间教学楼标识</label>
                <input type="text" id="slot34_special_pattern" placeholder="如：教2" disabled>
                <div class="hint">地点包含任一标识时，第3节改为 10:15–11:00，第4节改为 11:05–11:50。多个标识用英文逗号分隔，如 <code>教2,实2</code>。留空则不启用。</div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" id="save-admin-btn" onclick="saveAdminSettings()" disabled>保存</button>
                <span class="save-status" id="admin-save-status">✓ 已保存</span>
                <button class="btn btn-default" id="force-fetch-btn" onclick="forceFetch()" disabled style="margin-left:auto">立即抓取所有用户</button>
            </div>

            <!-- 分享码管理 -->
            <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--c-border-soft)">
                <div style="font-size:0.88rem;font-weight:500;margin-bottom:10px">分享码管理</div>
                <div id="admin-share-list">加载中...</div>
            </div>
        </div>

        <!-- ── 用户课表（管理员）── -->
        <div class="card" id="users-card" style="display:none">
            <div class="card-header">
                <h2>用户课表</h2>
                <span class="badge badge-admin">管理员</span>
            </div>
            <div style="font-size:0.8rem;color:var(--c-muted);margin-bottom:12px">仅展示已缓存的周次，不会主动请求教务系统。</div>
            <div id="users-list">加载中...</div>
        </div>

    </div>

    <script>
        let isAdmin = false;
        let maxWeekForExport = 20;
        let adminUsersList = [];
        const BUTTON_MODE_KEY = 'schedule_button_mode';
        const CAPTURE_PRESET_KEY = 'schedule_capture_preset';
        const ADVANCED_PANEL_KEY = 'schedule_advanced_options_open';

        function esc(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function readLocalPreference(key, fallback) {
            try {
                const value = localStorage.getItem(key);
                return value === null ? fallback : value;
            } catch (_) {
                return fallback;
            }
        }

        function writeLocalPreference(key, value) {
            try {
                localStorage.setItem(key, value);
            } catch (_) {}
        }

        function showAdvancedSaveStatus() {
            const el = document.getElementById('advanced-save-status');
            if (!el) return;
            el.classList.add('show');
            clearTimeout(showAdvancedSaveStatus._timer);
            showAdvancedSaveStatus._timer = setTimeout(() => el.classList.remove('show'), 2500);
        }

        function syncAdvancedPanel(open) {
            const panel = document.getElementById('advanced-panel');
            const toggle = document.getElementById('advanced-toggle');
            const icon = document.getElementById('advanced-toggle-icon');
            if (!panel || !toggle || !icon) return;
            panel.classList.toggle('open', open);
            toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
            icon.textContent = open ? '▴' : '▾';
            writeLocalPreference(ADVANCED_PANEL_KEY, open ? '1' : '0');
        }

        function toggleAdvancedOptions() {
            const panel = document.getElementById('advanced-panel');
            syncAdvancedPanel(!panel.classList.contains('open'));
        }

        function loadAdvancedOptions() {
            const mode = readLocalPreference(BUTTON_MODE_KEY, 'back_to_week');
            const preset = readLocalPreference(CAPTURE_PRESET_KEY, 'device');
            document.getElementById('home-button-mode').value = mode;
            document.getElementById('capture-size-preset').value = preset;
            syncAdvancedPanel(readLocalPreference(ADVANCED_PANEL_KEY, '0') === '1');
        }

        function saveAdvancedOptions() {
            const mode = document.getElementById('home-button-mode').value;
            const preset = document.getElementById('capture-size-preset').value;
            writeLocalPreference(BUTTON_MODE_KEY, mode);
            writeLocalPreference(CAPTURE_PRESET_KEY, preset);
            showAdvancedSaveStatus();
        }

        async function init() {
            const resp = await fetch('/api/settings', { credentials: 'include' });
            if (resp.status === 401) { location.href = '/login.html'; return; }

            const data = await resp.json();
            isAdmin = data.is_admin || false;
            maxWeekForExport = data.max_week || 20;

            const userResp = await fetch('/api/user', { credentials: 'include' });
            const user = await userResp.json();
            const adminLabel = isAdmin ? ' · <span style="color:#cf1322">管理员</span>' : '';
            document.getElementById('user-info').textContent = '';

            if (data.fetch_interval) {
                document.getElementById('fetch_interval').value = data.fetch_interval;
            }

            if (isAdmin) {
                document.getElementById('admin-card').style.display = 'block';
                document.getElementById('users-card').style.display = 'block';
                document.getElementById('fetch_interval').disabled = false;
                document.getElementById('slot34_special_pattern').disabled = false;
                document.getElementById('save-admin-btn').disabled = false;
                document.getElementById('force-fetch-btn').disabled = false;
                loadAdminShares();
                loadUsers();
            }

            if (data.slot34_special_pattern !== undefined) {
                document.getElementById('slot34_special_pattern').value = data.slot34_special_pattern;
            }

            loadAdvancedOptions();
            loadShares();
        }

        async function saveAdminSettings() {
            const val = parseInt(document.getElementById('fetch_interval').value, 10);
            if (isNaN(val) || val < 5 || val > 1440) {
                alert('间隔必须在 5 到 1440 分钟之间'); return;
            }
            const pattern = document.getElementById('slot34_special_pattern').value.trim();
            const btn = document.getElementById('save-admin-btn');
            btn.disabled = true; btn.textContent = '保存中…';
            try {
                const resp = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ fetch_interval: val, slot34_special_pattern: pattern }),
                });
                const data = await resp.json();
                if (data.success) {
                    const s = document.getElementById('admin-save-status');
                    s.classList.add('show');
                    setTimeout(() => s.classList.remove('show'), 2500);
                }
            } finally {
                btn.disabled = false; btn.textContent = '保存';
            }
        }

        async function forceFetch() {
            const btn = document.getElementById('force-fetch-btn');
            btn.disabled = true; btn.textContent = '抓取中…';
            try {
                const resp = await fetch('/api/admin/force_fetch', {
                    method: 'POST', credentials: 'include',
                });
                const data = await resp.json();
                alert(data.message || (data.error ? `失败：${data.error}` : '已触发'));
            } catch (e) {
                alert('请求失败，请重试');
            } finally {
                btn.disabled = false; btn.textContent = '立即抓取所有用户';
            }
        }

        async function clearLocalCache() {
            // 清除 Service Worker 缓存
            if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(k => caches.delete(k)));
            }
            // 注销 Service Worker
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(r => r.unregister()));
            }
            const el = document.getElementById('cache-clear-status');
            el.textContent = '✓ 本地缓存已清空，页面将刷新';
            el.style.display = 'block';
            setTimeout(() => location.reload(true), 800);
        }

        async function doLogout() {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            location.href = '/login.html';
        }

        // ── 导出整学期 ──────────────────────────────────────────────────────────
        async function exportSemester() {
            const btn    = document.getElementById('export-btn');
            const status = document.getElementById('export-status');
            btn.disabled = true;
            const result = { format: 'semester', weeks: {}, exported_at: new Date().toISOString() };
            let maxW = maxWeekForExport;

            for (let w = 1; w <= maxW; w++) {
                status.style.display = 'block';
                status.textContent   = `正在导出第 ${w}/${maxW} 周...`;
                try {
                    const resp = await fetch(`/api/courses/${w}`, { credentials: 'include' });
                    const data = await resp.json();
                    if (!data.error) {
                        result.weeks[w] = data;
                        if (data.metadata?.max_week) maxW = Math.min(data.metadata.max_week, 30);
                    }
                } catch (_) {}
            }

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `课表_整学期_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(a.href);

            status.textContent = `✓ 导出完成，共 ${Object.keys(result.weeks).length} 周`;
            btn.disabled = false;
            setTimeout(() => { status.style.display = 'none'; }, 4000);
        }

        // ── 我的分享码 ───────────────────────────────────────────────────────────
        async function loadShares() {
            const resp = await fetch('/api/share/list', { credentials: 'include' });
            if (!resp.ok) return;
            const data = await resp.json();
            const el   = document.getElementById('share-list');
            if (!data.tokens || data.tokens.length === 0) {
                el.innerHTML = '<div style="color:#aaa;font-size:0.82rem">暂无分享码</div>';
                return;
            }
            // 获取当前用户名用于分享文案
            const userResp = await fetch('/api/user', { credentials: 'include' });
            const userData = await userResp.json();
            const myName = userData.name || userData.username || '我';

            el.innerHTML = data.tokens.map(t => {
                const badge   = t.expired
                    ? '<span style="color:#ff4d4f;font-size:0.75rem">已过期</span>'
                    : '<span style="color:#52c41a;font-size:0.75rem">有效</span>';
                const expStr  = new Date(t.expires_at).toLocaleString();
                const created = new Date(t.created_at).toLocaleDateString();
                const shareLink = `${window.location.origin}/?code=${t.token}`;
                const shareText = `${myName}给你分享了自己的课程表，点击链接查看：${shareLink}`;
                return `<div class="token-row">
                    <code style="font-size:1rem;letter-spacing:2px;font-weight:bold">${esc(t.token)}</code>
                    <span style="font-size:0.8rem;color:#999">第${t.week_from}~${t.week_to}周</span>
                    <span style="font-size:0.8rem;color:#999">创建 ${created}</span>
                    <span style="font-size:0.8rem;color:#999">至 ${expStr}</span>
                    ${badge}
                    <button class="btn btn-primary" style="padding:3px 9px;font-size:0.78rem"
                            onclick="copyShareText('${esc(shareText)}')">分享</button>
                    <button class="btn btn-default" style="padding:3px 9px;font-size:0.78rem"
                            onclick="revokeShare('${esc(t.token)}')">撤销</button>
                </div>`;
            }).join('');
        }

        // 复制分享文案
        function copyShareText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制分享文案，快去粘贴给朋友吧！');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }

        // ── 管理员：所有用户分享码 ──────────────────────────────────────────────
        async function loadAdminShares() {
            const resp = await fetch('/api/share/list?all=1', { credentials: 'include' });
            if (!resp.ok) return;
            const data = await resp.json();
            const el   = document.getElementById('admin-share-list');
            if (!data.tokens || data.tokens.length === 0) {
                el.innerHTML = '<div style="color:#aaa;font-size:0.82rem">暂无分享码</div>';
                return;
            }
            el.innerHTML = data.tokens.map(t => {
                const badge   = t.expired
                    ? '<span style="color:#ff4d4f;font-size:0.75rem">已过期</span>'
                    : '<span style="color:#52c41a;font-size:0.75rem">有效</span>';
                const expStr  = new Date(t.expires_at).toLocaleString();
                const created = new Date(t.created_at).toLocaleDateString();
                const days    = Math.round((new Date(t.expires_at) - new Date(t.created_at)) / 86400000);
                const durStr  = days >= 160 ? '半年' : `${days}天`;
                const ownerName = t.owner_name || t.owner;
                const shareLink = `${window.location.origin}/?code=${t.token}`;
                const shareText = `${ownerName}给你分享了TA的课程表，点击链接查看：${shareLink}`;
                return `<div class="token-row">
                    <code style="font-size:0.95rem;letter-spacing:2px;font-weight:bold">${esc(t.token)}</code>
                    <span style="font-size:0.82rem;color:#1890ff;font-weight:500">${esc(ownerName)}</span>
                    <span style="font-size:0.78rem;color:#999">第${t.week_from}~${t.week_to}周</span>
                    <span style="font-size:0.78rem;color:#999">${created} · ${durStr}</span>
                    <span style="font-size:0.78rem;color:#999">至 ${expStr}</span>
                    ${badge}
                    <button class="btn btn-primary" style="padding:3px 9px;font-size:0.78rem"
                            onclick="copyShareText('${esc(shareText)}')">分享</button>
                    <button class="btn btn-default" style="padding:3px 9px;font-size:0.78rem"
                            onclick="revokeShare('${esc(t.token)}')">撤销</button>
                </div>`;
            }).join('');
        }

        async function createShare() {
            const wFrom = parseInt(document.getElementById('share-week-from').value, 10);
            const wTo   = parseInt(document.getElementById('share-week-to').value, 10);
            if (isNaN(wFrom) || isNaN(wTo) || wFrom < 1 || wTo > 30 || wFrom > wTo) {
                alert('请检查周次范围（1~30，起始不能大于结束）'); return;
            }
            const resp = await fetch('/api/share/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    expires_in: document.getElementById('share-expires').value,
                    week_from: wFrom, week_to: wTo,
                }),
            });
            const data = await resp.json();
            if (!data.success) { alert(data.error || '生成失败'); return; }

            document.getElementById('share-result-code').textContent = data.token;
            document.getElementById('share-result-info').textContent =
                `第 ${data.week_from}~${data.week_to} 周 · 有效至 ${new Date(data.expires_at).toLocaleString()}`;
            document.getElementById('share-result').style.display = 'block';
            loadShares();
            if (isAdmin) loadAdminShares();
        }

        function copyCode() {
            const code = document.getElementById('share-result-code').textContent;
            navigator.clipboard.writeText(code).then(() => alert(`已复制分享码：${code}`));
        }

        function copyShareLink() {
            const code = document.getElementById('share-result-code').textContent;
            const link = `${window.location.origin}/?code=${code}`;
            navigator.clipboard.writeText(link).then(() => alert('已复制分享链接'));
        }

        async function revokeShare(token) {
            if (!confirm(`确认撤销分享码 ${token}？`)) return;
            await fetch('/api/share/revoke', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ token }),
            });
            loadShares();
            if (isAdmin) loadAdminShares();
            if (document.getElementById('share-result-code').textContent === token) {
                document.getElementById('share-result').style.display = 'none';
            }
        }

        // ── 用户列表 ─────────────────────────────────────────────────────────────
        async function loadUsers() {
            const resp = await fetch('/api/admin/users', { credentials: 'include' });
            if (!resp.ok) return;
            const data = await resp.json();
            adminUsersList = data.users || [];
            const el = document.getElementById('users-list');
            if (!adminUsersList.length) {
                el.innerHTML = '<div style="color:#aaa;font-size:0.82rem">暂无用户</div>';
                return;
            }
            el.innerHTML = adminUsersList.map((u, i) => {
                const chips = u.cached_weeks.map(w =>
                    `<button class="week-chip" onclick="viewUserWeek(${i}, ${w})">第${w}周</button>`
                ).join('');
                const loginStr = u.last_login ? new Date(u.last_login).toLocaleDateString() : '未知';
                return `<div class="user-row">
                    <div class="user-row-head">
                        <span><strong>${esc(u.name)}</strong>
                            <span style="color:#999;font-size:0.85rem"> · ${esc(u.username)}</span>
                            <span style="color:#aaa;font-size:0.8rem"> · ${esc(u.class_name)}</span>
                        </span>
                        <span style="color:#aaa;font-size:0.78rem">最近登录 ${loginStr}</span>
                    </div>
                    <div class="week-chips">${chips || '<span style="color:#aaa;font-size:0.8rem">无缓存数据</span>'}</div>
                </div>`;
            }).join('');
        }

        function viewUserWeek(userIdx, week) {
            const u = adminUsersList[userIdx];
            location.href = `/?as=${encodeURIComponent(u.username)}&week=${week}`;
        }

        init();
    </script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    </script>
</body>
</html>
