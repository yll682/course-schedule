<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 课程表</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 20px;
            background: light-dark(#f5f5f5, #1a1a1a);
            color: light-dark(#333, #e0e0e0);
        }
        .container { max-width: 700px; margin: 0 auto; }
        .card {
            background: light-dark(white, #2d2d2d);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .card-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid light-dark(#f0f0f0, #444);
        }
        .card-header h2 { margin: 0; font-size: 1rem; }
        .badge {
            font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
            font-weight: 600;
        }
        .badge-admin { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; }
        .badge-user  { background: light-dark(#f0f5ff, #1a1f3a); color: light-dark(#2f54eb, #85a5ff); border: 1px solid light-dark(#adc6ff, #2f54eb); }
        .badge-soon  { background: light-dark(#f9f9f9, #333); color: #999; border: 1px solid #ddd; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 6px; }
        .field .hint { font-size: 0.78rem; color: #999; margin-top: 4px; }
        .field input, .field select {
            width: 100%; padding: 9px 12px;
            border: 1px solid light-dark(#d9d9d9, #555);
            border-radius: 6px;
            background: light-dark(white, #3a3a3a);
            color: inherit; font-size: 0.95rem;
        }
        .field input:disabled, .field select:disabled {
            background: light-dark(#fafafa, #2a2a2a);
            color: light-dark(#bbb, #666);
            cursor: not-allowed;
        }
        .coming-soon {
            padding: 14px 16px;
            border-radius: 6px;
            background: light-dark(#fafafa, #252525);
            border: 1px dashed light-dark(#ddd, #444);
            color: #aaa; font-size: 0.88rem; text-align: center;
        }
        .actions {
            display: flex; gap: 10px; margin-top: 4px;
        }
        .btn {
            padding: 9px 22px; border: none; border-radius: 6px;
            font-size: 0.9rem; cursor: pointer;
        }
        .btn-primary { background: light-dark(#1890ff, #0d5aa7); color: white; }
        .btn-primary:hover { opacity: 0.85; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-default {
            background: light-dark(white, #3a3a3a);
            color: inherit;
            border: 1px solid light-dark(#d9d9d9, #555);
        }
        .btn-default:hover { background: light-dark(#f5f5f5, #444); }
        .user-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .user-bar .info { font-size: 0.88rem; color: #999; }
        .save-status {
            font-size: 0.85rem; color: #52c41a;
            display: none; margin-left: 10px;
        }
        .save-status.show { display: inline; }
    </style>
</head>
<body>
    <div class="container">

        <div class="user-bar">
            <h1 style="margin:0;font-size:1.3rem">⚙️ 设置</h1>
            <span class="info" id="user-info">加载中...</span>
        </div>

        <!-- ── 管理员专属：全局抓取设置 ── -->
        <div class="card" id="admin-card" style="display:none">
            <div class="card-header">
                <h2>后台抓取</h2>
                <span class="badge badge-admin">管理员</span>
            </div>

            <div class="field">
                <label>自动抓取间隔（分钟）</label>
                <input type="number" id="fetch_interval" value="60" min="5" max="1440" disabled>
                <div class="hint">后台定时为所有用户抓取上周、当周、下周课表。建议 30-120 分钟。</div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="save-admin-btn" onclick="saveAdminSettings()" disabled>保存</button>
                <span class="save-status" id="admin-save-status">✓ 已保存</span>
            </div>
        </div>

        <!-- ── 个人设置（全员）：分享码管理 ── -->
        <div class="card">
            <div class="card-header">
                <h2>分享码</h2>
                <span class="badge badge-user">所有用户</span>
            </div>

            <!-- 创建 -->
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px">
                <div class="field" style="margin:0;flex:1;min-width:120px">
                    <label>有效期</label>
                    <select id="share-expires">
                        <option value="1d">1 天</option>
                        <option value="7d" selected>7 天</option>
                        <option value="30d">30 天</option>
                        <option value="180d">半年</option>
                    </select>
                </div>
                <div class="field" style="margin:0;flex:1;min-width:80px">
                    <label>从第几周</label>
                    <input type="number" id="share-week-from" value="1" min="1" max="30">
                </div>
                <div class="field" style="margin:0;flex:1;min-width:80px">
                    <label>到第几周</label>
                    <input type="number" id="share-week-to" value="19" min="1" max="30">
                </div>
                <button class="btn btn-primary" onclick="createShare()" style="white-space:nowrap">生成分享码</button>
            </div>

            <!-- 生成结果 -->
            <div id="share-result" style="display:none;background:light-dark(#f6ffed,#162312);border:1px solid light-dark(#b7eb8f,#274916);border-radius:6px;padding:12px;margin-bottom:16px">
                <div style="font-size:0.85rem;color:#52c41a;margin-bottom:6px">✓ 分享码已生成，发给对方即可</div>
                <div style="display:flex;align-items:center;gap:8px">
                    <code id="share-result-code" style="font-size:1.3rem;letter-spacing:4px;font-weight:bold"></code>
                    <button class="btn btn-default" style="padding:4px 10px;font-size:0.8rem" onclick="copyCode()">复制</button>
                </div>
                <div id="share-result-info" style="font-size:0.8rem;color:#999;margin-top:4px"></div>
            </div>

            <!-- 已有分享码列表 -->
            <div id="share-list-wrap">
                <div style="font-size:0.85rem;color:#999;margin-bottom:8px" id="share-list-label">我的分享码</div>
                <div id="share-list">加载中...</div>
            </div>
        </div>

        <!-- ── 返回 ── -->
        <div style="margin-top:8px">
            <button class="btn btn-default" onclick="location.href='/'">← 返回课程表</button>
        </div>

    </div>

    <script>
        let isAdmin = false;

        // XSS 防护
        function esc(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function init() {
            const resp = await fetch('/api/settings', { credentials: 'include' });
            if (resp.status === 401) { location.href = '/'; return; }

            const data = await resp.json();
            isAdmin = data.is_admin || false;

            // 更新用户栏
            const userResp = await fetch('/api/user', { credentials: 'include' });
            const user = await userResp.json();
            const adminLabel = isAdmin ? ' · <span style="color:#cf1322">管理员</span>' : '';
            document.getElementById('user-info').innerHTML =
                `${user.name || user.username} (${user.username})${adminLabel}`;

            // 填入当前设置值
            if (data.fetch_interval) {
                document.getElementById('fetch_interval').value = data.fetch_interval;
            }

            // 管理员才显示并可编辑
            if (isAdmin) {
                document.getElementById('admin-card').style.display = 'block';
                document.getElementById('fetch_interval').disabled = false;
                document.getElementById('save-admin-btn').disabled = false;
            }
        }

        async function saveAdminSettings() {
            const val = parseInt(document.getElementById('fetch_interval').value, 10);
            if (isNaN(val) || val < 5 || val > 1440) {
                alert('间隔必须在 5 到 1440 分钟之间');
                return;
            }
            const btn = document.getElementById('save-admin-btn');
            btn.disabled = true;
            btn.textContent = '保存中…';

            try {
                const resp = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        fetch_interval: val,
                    }),
                });
                const data = await resp.json();
                if (data.success) {
                    const status = document.getElementById('admin-save-status');
                    status.classList.add('show');
                    setTimeout(() => status.classList.remove('show'), 2500);
                }
            } finally {
                btn.disabled = false;
                btn.textContent = '保存';
            }
        }

        init();
        loadShares();

        // ── 分享码 ──────────────────────────────────────────────────────────────
        async function loadShares() {
            const url  = isAdmin ? '/api/share/list?all=1' : '/api/share/list';
            const resp = await fetch(url, { credentials: 'include' });
            if (!resp.ok) return;
            const data  = await resp.json();
            const el    = document.getElementById('share-list');
            const label = document.getElementById('share-list-label');
            if (isAdmin) label.textContent = '所有用户的分享码';
            if (!data.tokens || data.tokens.length === 0) {
                el.innerHTML = '<div style="color:#aaa;font-size:0.85rem">暂无分享码</div>';
                return;
            }
            el.innerHTML = data.tokens.map(t => {
                const exp   = new Date(t.expires_at).toLocaleString();
                const badge = t.expired
                    ? '<span style="color:#ff4d4f;font-size:0.75rem">已过期</span>'
                    : '<span style="color:#52c41a;font-size:0.75rem">有效</span>';
                const ownerTag = isAdmin
                    ? `<span style="font-size:0.8rem;color:#1890ff;font-weight:500">${esc(t.owner_name || t.owner)}</span>`
                    : '';
                return `
                <div style="display:flex;align-items:center;justify-content:space-between;
                            padding:8px 10px;border:1px solid light-dark(#f0f0f0,#444);
                            border-radius:6px;margin-bottom:6px;flex-wrap:wrap;gap:6px">
                    <code style="font-size:1rem;letter-spacing:2px;font-weight:bold">${esc(t.token)}</code>
                    ${ownerTag}
                    <span style="font-size:0.8rem;color:#999">第${t.week_from}~${t.week_to}周</span>
                    <span style="font-size:0.8rem;color:#999">至 ${exp}</span>
                    ${badge}
                    <button class="btn btn-default" style="padding:3px 10px;font-size:0.8rem"
                            onclick="revokeShare('${esc(t.token)}')">撤销</button>
                </div>`;
            }).join('');
        }

        async function createShare() {
            const wFrom = parseInt(document.getElementById('share-week-from').value, 10);
            const wTo   = parseInt(document.getElementById('share-week-to').value, 10);
            if (isNaN(wFrom) || isNaN(wTo) || wFrom < 1 || wTo > 30 || wFrom > wTo) {
                alert('请检查周次范围（1~30，起始不能大于结束）');
                return;
            }
            const resp = await fetch('/api/share/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    expires_in: document.getElementById('share-expires').value,
                    week_from:  wFrom,
                    week_to:    wTo,
                }),
            });
            const data = await resp.json();
            if (!data.success) { alert(data.error || '生成失败'); return; }

            document.getElementById('share-result-code').textContent = data.token;
            document.getElementById('share-result-info').textContent =
                `第 ${data.week_from}~${data.week_to} 周 · 有效至 ${new Date(data.expires_at).toLocaleString()}`;
            document.getElementById('share-result').style.display = 'block';
            loadShares();
        }

        function copyCode() {
            const code = document.getElementById('share-result-code').textContent;
            navigator.clipboard.writeText(code).then(() => alert(`已复制：${code}`));
        }

        async function revokeShare(token) {
            if (!confirm(`确认撤销分享码 ${token}？`)) return;
            await fetch('/api/share/revoke', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ token }),
            });
            loadShares();
            // 如果当前展示的正好是被撤销的码，隐藏结果框
            if (document.getElementById('share-result-code').textContent === token) {
                document.getElementById('share-result').style.display = 'none';
            }
        }
    </script>
</body>
</html>
