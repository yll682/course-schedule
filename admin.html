<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 20px;
            background: light-dark(#f5f5f5, #1a1a1a);
            color: light-dark(#333, #e0e0e0);
        }
        .container {
            max-width: 800px; margin: 0 auto;
            background: light-dark(white, #2d2d2d);
            padding: 30px; border-radius: 8px;
        }
        h1 { margin-top: 0; }
        .setting { margin: 20px 0; padding: 15px; background: light-dark(#f9f9f9, #3a3a3a); border-radius: 4px; }
        .setting label { display: block; margin-bottom: 8px; font-weight: bold; }
        .setting input { width: 100%; padding: 8px; border: 1px solid light-dark(#ddd, #555); border-radius: 4px; background: light-dark(white, #2d2d2d); color: inherit; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; background: light-dark(#1890ff, #0d5aa7); color: white; cursor: pointer; margin-right: 10px; }
        .btn:hover { opacity: 0.9; }
        .btn-secondary { background: light-dark(#666, #555); }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ 管理后台</h1>

        <div class="setting">
            <label>课表抓取频率（分钟）</label>
            <input type="number" id="fetch_interval" value="60" min="5" max="1440">
            <small>后台定时抓取所有用户的上周、当周、下周课表</small>
        </div>

        <div style="margin-top: 30px;">
            <button class="btn" onclick="saveSettings()">保存设置</button>
            <button class="btn btn-secondary" onclick="location.href='/'">返回</button>
        </div>
    </div>

    <script>
        async function loadSettings() {
            const resp = await fetch('/api/admin/settings', { credentials: 'include' });
            const data = await resp.json();
            if (data.fetch_interval) document.getElementById('fetch_interval').value = data.fetch_interval;
        }

        async function saveSettings() {
            const settings = {
                fetch_interval: document.getElementById('fetch_interval').value
            };
            await fetch('/api/admin/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(settings)
            });
            alert('保存成功');
        }

        loadSettings();
    </script>
</body>
</html>
