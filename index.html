<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程表</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1890ff">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="/style.css">
    <style>
        /* ── 顶栏 ── */
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px; margin: 4px 0 6px;
        }
        .page-header h1 {
            margin: 0; flex: 1; text-align: center;
            font-size: clamp(1.1rem, 4vw, 1.6rem);
        }
        .header-side { min-width: 80px; }
        .header-side.right { text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
        .side-label { font-size: 0.82rem; color: var(--c-hint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
        .icon-btn {
            padding: 5px 10px; background: transparent;
            border: 1px solid var(--c-border);
            border-radius: 6px; cursor: pointer; color: var(--c-text);
            font-size: 1rem; line-height: 1; white-space: nowrap;
        }
        .icon-btn:hover { background: var(--c-hover); }
        .icon-btn.capture-mode { min-width: 46px; }
        body { padding: 10px; }
        .container {
            max-width: 1400px; margin: 0 auto;
            background: var(--c-surface);
            padding: clamp(10px, 3vw, 20px);
            border-radius: 8px;
        }
        /* ── 周次栏 ── */
        .week-bar {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; margin: 6px 0 14px;
        }
        .week-bar button {
            padding: 6px 14px;
            border: 1px solid var(--c-border);
            background: var(--c-input);
            color: var(--c-text); border-radius: 4px; cursor: pointer; font-size: 0.9rem;
        }
        .week-bar button:hover { background: var(--c-hover2); }
        #current-week { font-size: 1rem; font-weight: 500; min-width: 64px; text-align: center; }
        /* ── 课表 ── */
        .meta { text-align: center; color: var(--c-muted); margin: 8px 0; font-size: clamp(0.72rem, 2vw, 0.88rem); }
        .timetable-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .timetable {
            display: grid;
            grid-template-columns: 52px repeat(7, minmax(72px, 1fr));
            grid-template-rows: 62px 62px 62px 62px 62px 3px 62px 62px 62px 62px 3px 62px 62px;
            gap: 1px;
            background: var(--c-grid);
            border: 1px solid var(--c-grid);
            min-width: 556px;
        }
        .cell { background: var(--c-surface); padding: 6px; overflow: hidden; position: relative; z-index: 1; }
        .header {
            background: var(--c-primary);
            color: white; font-weight: bold; text-align: center;
            padding: 8px; font-size: clamp(0.82rem, 2vw, 0.96rem);
        }
        .time-slot { background: var(--c-subtle); font-size: clamp(0.72rem, 1.6vw, 0.82rem); text-align: center; font-weight: bold; }
        .course { background: var(--c-course); border-left: 3px solid var(--c-accent); padding: 5px 6px; font-size: clamp(0.66rem, 1.8vw, 0.78rem); height: 100%; overflow: hidden; }
        .course-name { font-weight: bold; margin-bottom: 2px; line-height: 1.3; }
        .course-info { opacity: 0.8; font-size: clamp(0.60rem, 1.6vw, 0.68rem); line-height: 1.4; }
        .course { cursor: pointer; }
        .course:active { filter: brightness(0.93); }
        @media (max-width: 768px) {
            .cell { padding: 4px; }
            .course { padding: 4px 5px; }
        }
        /* ── 课程详情弹窗 ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--c-surface); border-radius: 12px;
            padding: 24px 20px 20px; max-width: 360px; width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            position: relative;
        }
        .modal-title {
            font-size: 1.1rem; font-weight: bold; margin: 0 0 14px;
            padding-right: 28px; line-height: 1.4; color: var(--c-text);
        }
        .modal-row {
            display: flex; gap: 8px; margin: 6px 0;
            font-size: 0.9rem; color: var(--c-text);
        }
        .modal-row .icon { flex-shrink: 0; width: 20px; }
        .modal-close {
            position: absolute; top: 14px; right: 14px;
            background: none; border: none; cursor: pointer;
            font-size: 1.2rem; color: var(--c-muted); line-height: 1;
            padding: 4px;
        }
        .modal-close:hover { color: var(--c-text); }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <div class="header-side">
                <span class="side-label" id="today-date"></span>
                <button class="icon-btn" id="back-week-btn" onclick="handleHeaderAction()" title="回本周" style="display:none">↩</button>
            </div>
            <h1>📚 课程表</h1>
            <div class="header-side right">
                <button class="icon-btn" id="settings-btn" onclick="location.href='/admin.html'" title="设置">⚙</button>
                <button class="icon-btn" id="exit-btn" onclick="handleExit()" style="display:none">退出</button>
            </div>
        </div>
        <div class="week-bar">
            <button onclick="changeWeek(-1)">◀ 上周</button>
            <span id="current-week">加载中...</span>
            <button onclick="changeWeek(1)">下周 ▶</button>
        </div>
        <div id="cache-warning" style="display:none;background:#fff3cd;color:#856404;padding:10px;border-radius:4px;margin:8px 0;text-align:center"></div>
        <div id="share-banner" style="display:none;background:#e6f4ff;color:#0958d9;padding:10px 14px;border-radius:4px;margin:8px 0;text-align:center;border:1px solid #91caff"></div>
        <div class="meta" id="meta"></div>
        <div class="timetable-wrapper"><div class="timetable" id="timetable"></div></div>
    </div>

    <!-- 课程详情弹窗 -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" id="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-title" id="modal-name"></div>
            <div class="modal-row"><span class="icon">📍</span><span id="modal-location"></span></div>
            <div class="modal-row"><span class="icon">⏰</span><span id="modal-time"></span></div>
            <div class="modal-row"><span class="icon">👨‍🏫</span><span id="modal-teacher"></span></div>
            <div class="modal-row" id="modal-weeks-row"><span class="icon">📅</span><span id="modal-weeks"></span></div>
        </div>
    </div>

    <script>
        function esc(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function openModal(course) {
            // 清理之前可能添加的冲突列表
            const existingList = document.getElementById('conflict-list');
            if (existingList) existingList.remove();

            document.getElementById('modal-name').textContent     = course.course_name;
            document.getElementById('modal-location').textContent = course.location;
            const t = getCourseTime(course.time_slots.start_slot, course.time_slots.duration, course.location);
            document.getElementById('modal-time').textContent     = t || course.time_slots.display;
            document.getElementById('modal-teacher').textContent  = course.teacher;
            const weeksRow = document.getElementById('modal-weeks-row');
            if (course.weeks) {
                document.getElementById('modal-weeks').textContent = course.weeks + ' 周';
                weeksRow.style.display = 'flex';
            } else {
                weeksRow.style.display = 'none';
            }
            document.getElementById('modal-overlay').classList.add('open');
        }

        function closeModal(e) {
            if (e && e.target !== document.getElementById('modal-overlay')) return;
            document.getElementById('modal-overlay').classList.remove('open');
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open');
        });

        let currentWeek = 0;
        let realCurrentWeek = 0;
        let maxWeek = 20;
        let shareWeekMin = 1, shareWeekMax = 20;
        let isShareMode  = false;
        let importMode   = false;
        let adminViewMode = false;
        let adminViewUser = null;
        let importWeeksMap = {};
        let slot34SpecialPattern = '';
        const BUTTON_MODE_KEY = 'schedule_button_mode';
        const CAPTURE_PRESET_KEY = 'schedule_capture_preset';
        let headerButtonMode = 'back_to_week';
        let captureSizePreset = 'device';
        const CAPTURE_PRESETS = {
            device: { label: '当前设备' },
            a4: { label: 'A4', width: 595, minHeight: 842 },
        };

        // 标准节次时间
        const _SLOT_START = {1:'08:30',2:'09:20',3:'10:25',4:'11:15',5:'14:30',6:'15:25',7:'16:20',8:'17:15',9:'19:00',10:'19:55'};
        const _SLOT_END   = {1:'09:15',2:'10:05',3:'11:10',4:'12:00',5:'15:15',6:'16:10',7:'17:05',8:'18:00',9:'19:45',10:'20:40'};
        // 特殊教学楼第3、4节时间（覆盖标准值）
        const _SLOT_START_SP = {3:'10:15', 4:'11:05'};
        const _SLOT_END_SP   = {3:'11:00', 4:'11:50'};

        function getCourseTime(startSlot, duration, location) {
            const patterns = slot34SpecialPattern.split(',').map(p => p.trim()).filter(Boolean);
            const special  = patterns.length > 0 && patterns.some(p => location.includes(p));
            const starts   = special ? {..._SLOT_START, ..._SLOT_START_SP} : _SLOT_START;
            const ends     = special ? {..._SLOT_END,   ..._SLOT_END_SP}   : _SLOT_END;
            const s = starts[startSlot] ?? '';
            const e = ends[startSlot + duration - 1] ?? '';
            return s && e ? `${s}–${e}` : '';
        }

        function readLocalPreference(key, fallback) {
            try {
                const value = localStorage.getItem(key);
                return value === null ? fallback : value;
            } catch (_) {
                return fallback;
            }
        }

        function loadHeaderPreferences() {
            const mode = readLocalPreference(BUTTON_MODE_KEY, 'back_to_week');
            const preset = readLocalPreference(CAPTURE_PRESET_KEY, 'device');
            headerButtonMode = mode === 'capture' ? 'capture' : 'back_to_week';
            captureSizePreset = CAPTURE_PRESETS[preset] ? preset : 'device';
        }

        function getCapturePreset() {
            return CAPTURE_PRESETS[captureSizePreset] || CAPTURE_PRESETS.device;
        }

        function getCaptureFileName() {
            const weekText = currentWeek ? `第${currentWeek}周_` : '';
            const date = new Date();
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `课表_${weekText}${y}-${m}-${d}.png`;
        }

        function setHeaderButtonCaptureMode(btn) {
            const preset = getCapturePreset();
            btn.classList.add('capture-mode');
            btn.textContent = '📷';
            btn.title = `截图（${preset.label}）`;
            btn.setAttribute('aria-label', btn.title);
            btn.style.display = '';
        }

        async function handleHeaderAction() {
            if (headerButtonMode === 'capture') {
                await captureCurrentView();
                return;
            }
            goCurrentWeek();
        }

        async function waitForNextPaint() {
            await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        }

        async function captureCurrentView() {
            const btn = document.getElementById('back-week-btn');
            const container = document.querySelector('.container');
            const wrapper = document.querySelector('.timetable-wrapper');
            const table = document.getElementById('timetable');
            const overlay = document.getElementById('modal-overlay');
            if (!btn || !container || !wrapper || !table) return;
            if (typeof html2canvas !== 'function') {
                alert('截图组件加载失败，请刷新后重试');
                return;
            }

            const preset = getCapturePreset();
            const original = {
                btnDisabled: btn.disabled,
                btnText: btn.textContent,
                btnTitle: btn.title,
                containerCssText: container.style.cssText,
                wrapperCssText: wrapper.style.cssText,
                tableCssText: table.style.cssText,
                bodyCssText: document.body.style.cssText,
                scrollX: window.scrollX,
                scrollY: window.scrollY,
            };
            const overlayWasOpen = overlay.classList.contains('open');

            try {
                closeModal();
                const now = new Date();
                const dateLabel = `${now.getMonth() + 1}/${now.getDate()}`;
                btn.disabled = true;
                btn.textContent = dateLabel;
                btn.title = '正在生成截图';
                btn.classList.remove('capture-mode');

                if (preset.width) {
                    container.style.maxWidth = `${preset.width}px`;
                    container.style.width = `${preset.width}px`;
                    container.style.margin = '0 auto';
                    container.style.padding = '12px';
                    container.style.minHeight = preset.minHeight ? `${preset.minHeight}px` : '';
                    wrapper.style.overflowX = 'visible';
                    table.style.minWidth = '0';
                    document.body.style.padding = '0';
                }

                await waitForNextPaint();
                const canvas = await html2canvas(container, {
                    backgroundColor: getComputedStyle(document.body).backgroundColor,
                    useCORS: true,
                    scale: Math.max(window.devicePixelRatio || 1, 2),
                });
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = getCaptureFileName();
                link.click();
            } catch (error) {
                console.error('截图失败', error);
                alert('截图失败，请稍后重试');
            } finally {
                container.style.cssText = original.containerCssText;
                wrapper.style.cssText = original.wrapperCssText;
                table.style.cssText = original.tableCssText;
                document.body.style.cssText = original.bodyCssText;
                btn.disabled = original.btnDisabled;
                btn.textContent = original.btnText;
                btn.title = original.btnTitle;
                if (overlayWasOpen) overlay.classList.add('open');
                window.scrollTo(original.scrollX, original.scrollY);
                updateBackWeekBtn();
            }
        }

        const _params = new URLSearchParams(window.location.search);
        adminViewUser = _params.get('as') || null;
        const _adminWeekParam = parseInt(_params.get('week') || '0', 10);
        const _shareCode = _params.get('code'); // 分享码参数

        // 处理分享码进入
        async function tryShareCode() {
            if (!_shareCode) return false;
            const resp = await fetch('/api/share/enter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ token: _shareCode }),
            });
            const result = await resp.json();
            if (result.success) {
                // 清除 URL 中的 code 参数，避免刷新重复提交
                const url = new URL(window.location);
                url.searchParams.delete('code');
                window.history.replaceState({}, '', url);
                return true;
            }
            return false;
        }

        async function checkAuth() {
            // 如果有分享码参数，先尝试用分享码进入
            if (_shareCode) {
                const success = await tryShareCode();
                if (success) {
                    // 分享码验证成功，直接进入分享模式，不再检查账号登录
                    const resp = await fetch('/api/user', { credentials: 'include' });
                    const data = await resp.json();
                    if (data.is_share_mode) {
                        isShareMode  = true;
                        shareWeekMin = data.share_week_from;
                        shareWeekMax = data.share_week_to;
                        document.getElementById('settings-btn').style.display = 'none';
                        const exitBtn = document.getElementById('exit-btn');
                        exitBtn.style.display = ''; exitBtn.textContent = '退出';

                        const expiry = new Date(data.share_expires_at).toLocaleDateString();
                        const banner = document.getElementById('share-banner');
                        banner.style.display = 'block';
                        banner.textContent = `👁 分享浏览模式（只读）· 第 ${shareWeekMin}~${shareWeekMax} 周 · 有效至 ${expiry}`;
                        if (currentWeek === 0) currentWeek = shareWeekMin;
                        document.getElementById('current-week').textContent = `第${currentWeek}周`;
                        loadCourses();
                        return;
                    }
                } else {
                    alert('分享码无效或已过期');
                }
            }

            const raw = sessionStorage.getItem('import_data');
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    if (data.format === 'semester' && data.weeks && Object.keys(data.weeks).length > 0) {
                        enterImportMode(data, 'semester'); return;
                    } else if (data.完整课表 && data.metadata) {
                        enterImportMode(data, 'single'); return;
                    }
                } catch (_) {}
                sessionStorage.removeItem('import_data');
            }

            const resp = await fetch('/api/user', { credentials: 'include' });
            const data = await resp.json();
            if (!data.logged_in) {
                // 如果有分享码但未登录，跳转到登录页并带上分享码
                if (_shareCode) {
                    window.location.href = '/login.html?code=' + encodeURIComponent(_shareCode);
                    return;
                }
                window.location.href = '/login.html';
                return;
            }

            if (data.slot34_special_pattern !== undefined) {
                slot34SpecialPattern = data.slot34_special_pattern;
            }

            if (data.is_share_mode) {
                isShareMode  = true;
                shareWeekMin = data.share_week_from;
                shareWeekMax = data.share_week_to;
                document.getElementById('settings-btn').style.display = 'none';
                const exitBtn = document.getElementById('exit-btn');
                exitBtn.style.display = ''; exitBtn.textContent = '退出';
                const expiry = new Date(data.share_expires_at).toLocaleDateString();
                const banner = document.getElementById('share-banner');
                banner.style.display = 'block';
                banner.textContent = `👁 分享浏览模式（只读）· 第 ${shareWeekMin}~${shareWeekMax} 周 · 有效至 ${expiry}`;
                return;
            }



            if (adminViewUser && data.is_admin) {
                adminViewMode = true;
                currentWeek   = _adminWeekParam || 1;
                document.getElementById('settings-btn').style.display = 'none';
                const exitBtn = document.getElementById('exit-btn');
                exitBtn.style.display = ''; exitBtn.textContent = '← 返回设置';
                document.getElementById('current-week').textContent = `第${currentWeek}周`;
                const banner = document.getElementById('share-banner');
                banner.style.cssText = 'display:block;background:#fff7e6;color:#874d00;padding:10px 14px;border-radius:4px;margin:8px 0;text-align:center;border:1px solid #ffd591';
                banner.textContent = `👁 管理员预览 · ${adminViewUser} 的课表（仅缓存数据）`;
            }
        }

        function enterImportMode(data, format) {
            importMode = true;
            if (format === 'semester') {
                for (const [k, v] of Object.entries(data.weeks)) {
                    importWeeksMap[parseInt(k)] = v;
                }
                const nums = Object.keys(importWeeksMap).map(Number).sort((a, b) => a - b);
                currentWeek = nums[0] || 1;
                maxWeek     = nums[nums.length - 1] || 20;
                const banner = document.getElementById('share-banner');
                banner.style.cssText = 'display:block;background:#fff7e6;color:#d46b08;padding:10px 14px;border-radius:4px;margin:8px 0;text-align:center;border:1px solid #ffd591';
                banner.textContent = `📂 导入预览模式（只读）· 共 ${nums.length} 周数据 · 关闭标签页后需重新导入`;
            } else {
                currentWeek = data.metadata?.current_week || 1;
                maxWeek     = data.metadata?.max_week || currentWeek;
                importWeeksMap[currentWeek] = data;
                const banner = document.getElementById('share-banner');
                banner.style.cssText = 'display:block;background:#fff7e6;color:#d46b08;padding:10px 14px;border-radius:4px;margin:8px 0;text-align:center;border:1px solid #ffd591';
                banner.textContent = '📂 导入预览模式（只读）· 关闭标签页后需重新导入';
            }
            document.getElementById('settings-btn').style.display = 'none';
            const exitBtn = document.getElementById('exit-btn');
            exitBtn.style.display = ''; exitBtn.textContent = '退出预览';

            document.getElementById('current-week').textContent = `第${currentWeek}周`;
            renderCourses(importWeeksMap[currentWeek]);
        }

        function handleExit() {
            sessionStorage.removeItem('import_data');
            if (adminViewMode) { location.href = '/admin.html'; return; }
            if (!importMode) fetch('/api/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/login.html';
        }

        function changeWeek(delta) {
            if (importMode) {
                const available = Object.keys(importWeeksMap).map(Number).sort((a, b) => a - b);
                const idx = available.indexOf(currentWeek);
                if (idx === -1) return;
                const newIdx = idx + delta;
                if (newIdx < 0 || newIdx >= available.length) return;
                currentWeek = available[newIdx];
                document.getElementById('current-week').textContent = `第${currentWeek}周`;
                renderCourses(importWeeksMap[currentWeek]);
                return;
            }
            if (currentWeek === 0) return;
            currentWeek += delta;
            const minW = isShareMode ? shareWeekMin : 1;
            const maxW = isShareMode ? shareWeekMax : maxWeek;
            if (currentWeek < minW) currentWeek = minW;
            if (currentWeek > maxW) currentWeek = maxW;
            document.getElementById('current-week').textContent = `第${currentWeek}周`;
            updateBackWeekBtn();
            loadCourses();
        }

        function goCurrentWeek() {
            if (!realCurrentWeek || currentWeek === realCurrentWeek) return;
            currentWeek = realCurrentWeek;
            document.getElementById('current-week').textContent = `第${currentWeek}周`;
            updateBackWeekBtn();
            loadCourses();
        }

        function updateBackWeekBtn() {
            const btn = document.getElementById('back-week-btn');
            const dateEl = document.getElementById('today-date');
            if (!btn) return;
            const now = new Date();
            const notCurrent = realCurrentWeek && currentWeek !== realCurrentWeek;

            btn.classList.remove('capture-mode');
            btn.setAttribute('aria-label', '回本周');

            if (headerButtonMode === 'capture') {
                setHeaderButtonCaptureMode(btn);
                if (dateEl) dateEl.style.display = 'none';
                return;
            }

            btn.textContent = '↩';
            btn.title = '回本周';
            btn.style.display = notCurrent ? '' : 'none';
            if (dateEl) {
                if (notCurrent) {
                    dateEl.style.display = 'none';
                } else {
                    dateEl.textContent = `${now.getMonth() + 1}/${now.getDate()}`;
                    dateEl.style.display = '';
                }
            }
        }

        async function loadCourses() {
            if (importMode) return;
            document.getElementById('timetable').innerHTML =
                '<div style="grid-column:1/-1;padding:20px;text-align:center;color:#999">加载中...</div>';
            try {
                const url = adminViewMode
                    ? `/api/admin/view/${encodeURIComponent(adminViewUser)}/${currentWeek}`
                    : `/api/courses/${currentWeek}`;
                const resp = await fetch(url, { credentials: 'include' });
                const data = await resp.json();

                if (data.error) {
                    document.getElementById('timetable').innerHTML =
                        `<div style="grid-column:1/-1;padding:20px;text-align:center;color:red">${esc(data.error)}</div>`;
                    return;
                }

                if (!adminViewMode && data.metadata) {
                    if (currentWeek === 0) {
                        let w = data.metadata.current_week || 2;
                        if (isShareMode) w = Math.max(shareWeekMin, Math.min(shareWeekMax, w));
                        currentWeek = w;
                    }
                    if (data.metadata.current_week) realCurrentWeek = data.metadata.current_week;
                    if (data.metadata.max_week) maxWeek = data.metadata.max_week;
                    document.getElementById('current-week').textContent = `第${currentWeek}周`;
                    updateBackWeekBtn();
                }

                const w = document.getElementById('cache-warning');
                if (data.fetch_failed) {
                    const t = new Date(data.cache_time).toLocaleString();
                    w.style.display = 'block';
                    w.style.color = '#d46b08';
                    w.textContent = `⚠️ 实时获取失败，显示缓存课表（${t}）。如持续出现，请检查移动教务状态或在设置中重新登录`;
                } else {
                    w.style.display = 'none';
                }

                renderCourses(data);
            } catch (e) {
                document.getElementById('timetable').innerHTML =
                    '<div style="grid-column:1/-1;padding:20px;text-align:center;color:red">加载失败，请刷新重试</div>';
            }
        }

        function renderCourses(data) {
            const updateTime = data.from_cache
                ? new Date(data.cache_time).toLocaleString()
                : new Date(data.metadata.提取时间).toLocaleString();
            document.getElementById('meta').innerHTML =
                `${esc(data.metadata.用户)} | ${esc(data.metadata.班级)} | ${esc(data.metadata.周次)} | 更新: ${updateTime}`;

            const weekMap   = {'1':'周一','2':'周二','3':'周三','4':'周四','5':'周五','6':'周六','0':'周日'};
            const weekOrder = ['1','2','3','4','5','6','0'];
            const table = document.getElementById('timetable');

            const times = {
                1:'08:30-09:15', 2:'09:20-10:05',
                3:'10:25-11:10', 4:'11:15-12:00',
                5:'14:30-15:15', 6:'15:25-16:10',
                7:'16:20-17:05', 8:'17:15-18:00',
                9:'19:00-19:45', 10:'19:55-20:40',
            };

            // 课程数据索引，供点击事件查询
            window._courseMap = {};

            // slot 编号 → grid 行号（表头占第1行，分隔行占第6、11行）
            function slotRow(s) {
                if (s <= 4) return s + 1;
                if (s <= 8) return s + 2;
                return s + 3;
            }

            // 表头行（grid-row:1）
            table.innerHTML = '<div class="cell header" style="grid-row:1;grid-column:1">节次</div>';
            weekOrder.forEach((day, di) => {
                const dayData = data.完整课表.find(d => d.weekday === day);
                const dateStr = dayData && dayData.date ? dayData.date.slice(5) : '';
                table.innerHTML += `<div class="cell header" style="grid-row:1;grid-column:${di+2}">${weekMap[day]}<br><small>${dateStr}</small></div>`;
            });

            // 两条分隔行（显式定位，不参与自动布局）
            table.innerHTML += '<div style="grid-row:6;grid-column:1/-1;background:var(--c-surface)"></div>';
            table.innerHTML += '<div style="grid-row:11;grid-column:1/-1;background:var(--c-surface)"></div>';

            const occupied = {};
            for (let slot = 1; slot <= 10; slot++) {
                const gr = slotRow(slot);
                table.innerHTML += `<div class="cell time-slot" style="grid-row:${gr};grid-column:1">${slot}<br><small style="font-weight:normal">${times[slot]}</small></div>`;
                weekOrder.forEach((day, di) => {
                    const gc = di + 2;
                    const key = `${day}-${slot}`;
                    if (occupied[key]) return;
                    const dayData = data.完整课表.find(d => d.weekday === day);

                    // 找出从当前slot开始的所有课程
                    const coursesStartingHere = dayData ? dayData.courses.filter(c =>
                        c.time_slots.start_slot === slot
                    ) : [];

                    if (coursesStartingHere.length > 0) {
                        // 找出所有与这些课程时间重叠的课程
                        const allConflictingCourses = [];
                        coursesStartingHere.forEach(course => {
                            const start = course.time_slots.start_slot;
                            const end = start + course.time_slots.duration - 1;

                            // 查找所有与当前课程时间重叠的其他课程
                            const conflicts = dayData.courses.filter(c => {
                                if (c === course) return false;
                                const cStart = c.time_slots.start_slot;
                                const cEnd = cStart + c.time_slots.duration - 1;
                                return !(cEnd < start || cStart > end);
                            });

                            if (conflicts.length > 0) {
                                allConflictingCourses.push(course, ...conflicts);
                            }
                        });

                        // 去重
                        const uniqueCourses = allConflictingCourses.length > 0
                            ? Array.from(new Set(allConflictingCourses))
                            : coursesStartingHere;

                        // 渲染第一门课程
                        const course = coursesStartingHere[0];
                        const duration = course.time_slots.duration;
                        for (let i = 0; i < duration; i++) occupied[`${day}-${slot+i}`] = true;

                        const courseTime = getCourseTime(course.time_slots.start_slot, course.time_slots.duration, course.location);
                        const endGr = slotRow(slot + duration - 1) + 1;

                        // 如果有冲突课程，显示警告标记
                        const hasConflict = uniqueCourses.length > 1;
                        const conflictMark = hasConflict ? '<span style="color:red;font-weight:bold">⚠️</span> ' : '';

                        table.innerHTML += `
                            <div class="cell" style="grid-row:${gr}/${endGr};grid-column:${gc}">
                                <div class="course" data-key="${esc(key)}" style="${hasConflict ? 'border-left-color:#ff4d4f;' : ''}">
                                    <div class="course-name">${conflictMark}${esc(course.course_name)}</div>
                                    <div class="course-info">📍 ${esc(course.location)}</div>
                                    <div class="course-info">⏰ ${esc(courseTime || course.time_slots.display)}</div>
                                    <div class="course-info">👨‍🏫 ${esc(course.teacher)}</div>
                                    ${hasConflict ? `<div class="course-info" style="color:#ff4d4f;font-weight:bold">+${uniqueCourses.length - 1}门冲突</div>` : ''}
                                </div>
                            </div>`;

                        // 存储所有冲突课程供点击查看
                        window._courseMap[key] = hasConflict ? uniqueCourses : course;
                    } else {
                        table.innerHTML += `<div class="cell" style="grid-row:${gr};grid-column:${gc}"></div>`;
                    }
                });
            }
        }

        document.getElementById('timetable').addEventListener('click', e => {
            const cell = e.target.closest('[data-key]');
            if (!cell) return;
            const courseData = window._courseMap[cell.dataset.key];
            if (!courseData) return;

            // 如果是数组，说明有多门课程冲突
            if (Array.isArray(courseData)) {
                // 清理之前可能添加的冲突列表（避免累积）
                const existingList = document.getElementById('conflict-list');
                if (existingList) existingList.remove();

                // 显示所有冲突课程的列表
                let html = '<div style="max-height:400px;overflow-y:auto" id="conflict-list">';
                courseData.forEach((course, idx) => {
                    const t = getCourseTime(course.time_slots.start_slot, course.time_slots.duration, course.location);
                    html += `
                        <div style="padding:12px;margin-bottom:10px;background:var(--c-subtle);border-radius:6px;border-left:3px solid ${idx === 0 ? 'var(--c-accent)' : '#ff4d4f'}">
                            <div style="font-weight:bold;margin-bottom:6px">${esc(course.course_name)}</div>
                            <div style="font-size:0.85rem;line-height:1.6">
                                📍 ${esc(course.location)}<br>
                                ⏰ ${esc(t || course.time_slots.display)}<br>
                                👨‍🏫 ${esc(course.teacher)}<br>
                                📅 ${esc(course.weeks)} 周
                            </div>
                        </div>`;
                });
                html += '</div>';

                document.getElementById('modal-name').textContent = '⚠️ 课程时间冲突';
                document.getElementById('modal-location').textContent = courseData.length + '门课程时间冲突';
                document.getElementById('modal-time').textContent = '';
                document.getElementById('modal-teacher').textContent = '';
                document.getElementById('modal-weeks-row').style.display = 'none';
                document.getElementById('modal').insertAdjacentHTML('beforeend', html);
                document.getElementById('modal-overlay').classList.add('open');
            } else {
                // 单门课程，正常显示
                openModal(courseData);
            }
        });

        async function init() {
            loadHeaderPreferences();
            updateBackWeekBtn();
            await checkAuth();
            if (!importMode) {
                loadCourses();

                // 获取后端的刷新间隔设置，前端自动刷新间隔设为后端的一半
                let refreshInterval = 15 * 60 * 1000; // 默认15分钟
                try {
                    const resp = await fetch('/api/settings', { credentials: 'include' });
                    const data = await resp.json();
                    if (data.fetch_interval) {
                        // fetch_interval单位是分钟，前端刷新间隔设为其一半
                        refreshInterval = parseInt(data.fetch_interval) * 60 * 1000 / 2;
                    }
                } catch (e) {
                    console.warn('获取刷新间隔设置失败，使用默认值', e);
                }

                // 定期自动刷新
                setInterval(() => {
                    if (!importMode && !adminViewMode) loadCourses();
                }, refreshInterval);
            }
        }
        init();
    </script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
