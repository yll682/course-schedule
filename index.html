<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程表</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 10px;
            background: light-dark(#f5f5f5, #1a1a1a);
            color: light-dark(#333, #e0e0e0);
        }
        .container {
            max-width: 1400px; margin: 0 auto;
            background: light-dark(white, #2d2d2d);
            padding: clamp(10px, 3vw, 20px);
            border-radius: 8px;
        }
        h1 { text-align: center; font-size: clamp(1.2rem, 4vw, 1.8rem); margin: 10px 0; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; flex-wrap: wrap; gap: 10px; }
        .week-selector { display: flex; align-items: center; gap: 10px; }
        .week-selector button { padding: 6px 12px; border: 1px solid light-dark(#ddd, #555); background: light-dark(white, #3a3a3a); color: inherit; border-radius: 4px; cursor: pointer; }
        .week-selector button:hover { background: light-dark(#f0f0f0, #4a4a4a); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .btn { padding: 6px 12px; border: 1px solid light-dark(#1890ff, #40a9ff); background: light-dark(#1890ff, #0d5aa7); color: white; border-radius: 4px; cursor: pointer; }
        .btn:hover { opacity: 0.8; }
        .login-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; }
        .login-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: light-dark(white, #2d2d2d); padding: 30px; border-radius: 8px; width: 90%; max-width: 400px; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid light-dark(#ddd, #555); border-radius: 4px; background: light-dark(white, #3a3a3a); color: inherit; }
        .meta { text-align: center; color: light-dark(#999, #888); margin: 10px 0; font-size: clamp(0.75rem, 2vw, 0.9rem); }
        .timetable {
            display: grid;
            grid-template-columns: minmax(40px, 60px) repeat(7, 1fr);
            grid-auto-rows: minmax(50px, auto);
            gap: 1px;
            background: light-dark(#ddd, #444);
            border: 1px solid light-dark(#ddd, #444);
            overflow-x: auto;
        }
        .cell { background: light-dark(white, #2d2d2d); padding: 6px; min-height: 50px; position: relative; }
        .header {
            background: light-dark(#1890ff, #0d5aa7);
            color: white; font-weight: bold; text-align: center;
            padding: 8px; font-size: clamp(0.7rem, 2vw, 0.9rem);
        }
        .time-slot { background: light-dark(#f0f0f0, #3a3a3a); font-size: clamp(0.7rem, 2vw, 0.85rem); text-align: center; font-weight: bold; }
        .course { background: light-dark(#e6f7ff, #1a3a4a); border-left: 3px solid light-dark(#1890ff, #40a9ff); padding: 6px; font-size: clamp(0.7rem, 1.8vw, 0.85rem); height: 100%; }
        .course-name { font-weight: bold; margin-bottom: 3px; }
        .course-info { opacity: 0.8; font-size: clamp(0.65rem, 1.6vw, 0.75rem); line-height: 1.4; }
        @media (max-width: 768px) {
            .timetable { font-size: 0.75rem; }
            .cell { padding: 4px; min-height: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 我的课程表</h1>
        <div class="toolbar">
            <div class="week-selector">
                <button onclick="changeWeek(-1)">◀ 上周</button>
                <span id="current-week">第2周</span>
                <button onclick="changeWeek(1)">下周 ▶</button>
            </div>
            <div class="user-info">
                <span id="username"></span>
                <button class="btn" id="admin-btn" onclick="location.href='/admin.html'" style="display:none">管理</button>
                <button class="btn" onclick="logout()">退出</button>
            </div>
        </div>
        <div id="cache-warning" style="display:none;background:#fff3cd;color:#856404;padding:10px;border-radius:4px;margin:10px 0;text-align:center"></div>
        <div class="meta" id="meta"></div>
        <div class="timetable" id="timetable"></div>
    </div>

    <script>
        let currentWeek = 2;
        let userData = null;

        async function checkAuth() {
            const resp = await fetch('/api/user', { credentials: 'include' });
            const data = await resp.json();
            if (!data.logged_in) {
                window.location.href = '/';
                return;
            }
            userData = data;
            document.getElementById('username').textContent = data.username;
            if (data.is_admin) {
                document.getElementById('admin-btn').style.display = 'inline-block';
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/';
        }

        function changeWeek(delta) {
            currentWeek += delta;
            if (currentWeek < 1) currentWeek = 1;
            if (currentWeek > 20) currentWeek = 20;
            document.getElementById('current-week').textContent = `第${currentWeek}周`;
            loadCourses();
        }

        async function loadCourses() {
            try {
                const resp = await fetch(`/api/courses/${currentWeek}`, { credentials: 'include' });
                const data = await resp.json();

                if (data.from_cache) {
                    const warning = document.getElementById('cache-warning');
                    warning.style.display = 'block';
                    warning.textContent = `⚠️ 教务系统连接失败，显示缓存课表（${new Date(data.cache_time).toLocaleString()}）`;
                } else {
                    document.getElementById('cache-warning').style.display = 'none';
                }

                renderCourses(data);
            } catch (e) {
                alert('加载失败');
            }
        }

        function renderCourses(data) {
            document.getElementById('meta').innerHTML =
                `${data.metadata.用户} | ${data.metadata.班级} | ${data.metadata.周次} | 更新: ${new Date(data.metadata.提取时间).toLocaleString()}`;

            const weekMap = {
                'Sunday': '周一', 'monday': '周二', 'Tuesday': '周三',
                'Wednesday': '周四', 'Thursday': '周五', 'Friday': '周六', 'Saturday': '周日'
            };

            const weekOrder = ['Sunday', 'monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const table = document.getElementById('timetable');

            table.innerHTML = '<div class="cell header">节次</div>';
            weekOrder.forEach(day => {
                const dayData = data.完整课表.find(d => d.weekday === day);
                table.innerHTML += `<div class="cell header">${weekMap[day]}<br><small>${dayData.date.slice(5)}</small></div>`;
            });

            const times = {
                1: '8:30-9:15', 2: '9:20-10:05', 3: '10:15-11:00', 4: '11:05-11:50',
                5: '14:30-15:15', 6: '15:25-16:10', 7: '16:20-17:05', 8: '17:15-18:00',
                9: '19:00-19:45', 10: '19:55-20:40'
            };

            const occupied = {};

            for (let slot = 1; slot <= 10; slot++) {
                table.innerHTML += `<div class="cell time-slot">${slot}<br><small style="font-size:0.7em;font-weight:normal">${times[slot]}</small></div>`;

                weekOrder.forEach(day => {
                    const key = `${day}-${slot}`;
                    if (occupied[key]) return;

                    const dayData = data.完整课表.find(d => d.weekday === day);
                    const course = dayData.courses.find(c => c.time_slots.start_slot === slot);

                    if (course) {
                        const duration = course.time_slots.duration;
                        for (let i = 0; i < duration; i++) {
                            occupied[`${day}-${slot + i}`] = true;
                        }
                        table.innerHTML += `
                            <div class="cell" style="grid-row: span ${duration}">
                                <div class="course">
                                    <div class="course-name">${course.course_name}</div>
                                    <div class="course-info">📍 ${course.location}</div>
                                    <div class="course-info">⏰ ${course.time_slots.display}</div>
                                    <div class="course-info">👨‍🏫 ${course.teacher}</div>
                                </div>
                            </div>`;
                    } else {
                        table.innerHTML += '<div class="cell"></div>';
                    }
                });
            }
        }

        checkAuth();
        loadCourses();
    </script>
</body>
</html>
