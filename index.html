<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程表</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 10px;
            background: light-dark(#f5f5f5, #1a1a1a);
            color: light-dark(#333, #e0e0e0);
        }
        .container {
            max-width: 1400px; margin: 0 auto;
            background: light-dark(white, #2d2d2d);
            padding: clamp(10px, 3vw, 20px);
            border-radius: 8px;
        }
        h1 { text-align: center; font-size: clamp(1.2rem, 4vw, 1.8rem); margin: 10px 0; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; flex-wrap: wrap; gap: 10px; }
        .week-selector { display: flex; align-items: center; gap: 10px; }
        .week-selector button { padding: 6px 12px; border: 1px solid light-dark(#ddd, #555); background: light-dark(white, #3a3a3a); color: inherit; border-radius: 4px; cursor: pointer; }
        .week-selector button:hover { background: light-dark(#f0f0f0, #4a4a4a); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .btn { padding: 6px 12px; border: 1px solid light-dark(#1890ff, #40a9ff); background: light-dark(#1890ff, #0d5aa7); color: white; border-radius: 4px; cursor: pointer; }
        .btn:hover { opacity: 0.8; }
        .meta { text-align: center; color: light-dark(#999, #888); margin: 10px 0; font-size: clamp(0.75rem, 2vw, 0.9rem); }
        .timetable {
            display: grid;
            grid-template-columns: minmax(50px, 70px) repeat(7, 1fr);
            grid-auto-rows: minmax(50px, auto);
            gap: 1px;
            background: light-dark(#ddd, #444);
            border: 1px solid light-dark(#ddd, #444);
            overflow-x: auto;
        }
        .cell { background: light-dark(white, #2d2d2d); padding: 6px; min-height: 50px; position: relative; }
        .header {
            background: light-dark(#1890ff, #0d5aa7);
            color: white; font-weight: bold; text-align: center;
            padding: 8px; font-size: clamp(0.7rem, 2vw, 0.9rem);
        }
        .time-slot { background: light-dark(#f0f0f0, #3a3a3a); font-size: clamp(0.65rem, 1.8vw, 0.8rem); text-align: center; font-weight: bold; }
        .course { background: light-dark(#e6f7ff, #1a3a4a); border-left: 3px solid light-dark(#1890ff, #40a9ff); padding: 6px; font-size: clamp(0.7rem, 1.8vw, 0.85rem); height: 100%; }
        .course-name { font-weight: bold; margin-bottom: 3px; }
        .course-info { opacity: 0.8; font-size: clamp(0.65rem, 1.6vw, 0.75rem); line-height: 1.4; }
        @media (max-width: 768px) {
            .timetable { font-size: 0.75rem; }
            .cell { padding: 4px; min-height: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 我的课程表</h1>
        <div class="toolbar">
            <div class="week-selector">
                <button onclick="changeWeek(-1)">◀ 上周</button>
                <span id="current-week">加载中...</span>
                <button onclick="changeWeek(1)">下周 ▶</button>
            </div>
            <div class="user-info">
                <span id="username"></span>
                <button class="btn" id="export-btn" onclick="exportTimetable()" style="display:none">导出</button>
                <button class="btn" id="admin-btn" onclick="location.href='/admin.html'">设置</button>
                <button class="btn" id="logout-btn" onclick="logout()">退出</button>
            </div>
        </div>
        <div id="cache-warning" style="display:none;background:#fff3cd;color:#856404;padding:10px;border-radius:4px;margin:10px 0;text-align:center"></div>
        <div id="share-banner" style="display:none;background:#e6f4ff;color:#0958d9;padding:10px 14px;border-radius:4px;margin:10px 0;text-align:center;border:1px solid #91caff"></div>
        <div class="meta" id="meta"></div>
        <div class="timetable" id="timetable"></div>
    </div>

    <script>
        // XSS 防护：插入 innerHTML 前转义所有 API 数据
        function esc(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        let currentWeek = 0;
        let maxWeek = 20;
        let shareWeekMin = 1;
        let shareWeekMax = 20;
        let isShareMode  = false;
        let importMode   = false;
        let lastCourseData = null;
        let userData = null;

        async function checkAuth() {
            // 导入预览模式：从 sessionStorage 加载课表
            const raw = sessionStorage.getItem('import_data');
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    if (data.完整课表 && data.metadata) {
                        enterImportMode(data);
                        return;
                    }
                } catch (_) {}
                sessionStorage.removeItem('import_data');
            }

            const resp = await fetch('/api/user', { credentials: 'include' });
            const data = await resp.json();
            if (!data.logged_in) {
                window.location.href = '/login.html';
                return;
            }
            userData = data;
            if (data.is_share_mode) {
                isShareMode  = true;
                shareWeekMin = data.share_week_from;
                shareWeekMax = data.share_week_to;
                document.getElementById('admin-btn').style.display = 'none';
                document.getElementById('username').textContent = `查看 ${data.owner_name} 的课表`;
                const expiry = new Date(data.share_expires_at).toLocaleDateString();
                const banner = document.getElementById('share-banner');
                banner.style.display = 'block';
                banner.textContent =
                    `👁 分享浏览模式（只读）· 第 ${shareWeekMin}~${shareWeekMax} 周 · 有效至 ${expiry}`;
            } else {
                document.getElementById('username').textContent = data.name || data.username;
            }
        }

        function enterImportMode(data) {
            importMode     = true;
            lastCourseData = data;
            maxWeek        = data.metadata?.max_week || 20;
            currentWeek    = data.metadata?.current_week || 1;

            document.getElementById('admin-btn').style.display  = 'none';
            document.getElementById('export-btn').style.display = 'none';
            document.getElementById('username').textContent     = '导入预览';
            document.getElementById('logout-btn').textContent   = '退出预览';
            document.getElementById('current-week').textContent = `第${currentWeek}周`;

            const banner = document.getElementById('share-banner');
            banner.style.cssText = 'display:block;background:#fff7e6;color:#d46b08;padding:10px 14px;border-radius:4px;margin:10px 0;text-align:center;border:1px solid #ffd591';
            banner.textContent = '📂 导入预览模式（只读）· 关闭标签页后需重新导入';

            renderCourses(data);
        }

        async function logout() {
            sessionStorage.removeItem('import_data');
            if (!importMode) {
                await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            }
            window.location.href = '/login.html';
        }

        function changeWeek(delta) {
            if (importMode) return;  // 导入模式只有单周数据
            if (currentWeek === 0) return;
            currentWeek += delta;
            const minW = isShareMode ? shareWeekMin : 1;
            const maxW = isShareMode ? shareWeekMax : maxWeek;
            if (currentWeek < minW) currentWeek = minW;
            if (currentWeek > maxW) currentWeek = maxW;
            document.getElementById('current-week').textContent = `第${currentWeek}周`;
            loadCourses();
        }

        async function loadCourses() {
            if (importMode) return;
            document.getElementById('timetable').innerHTML =
                '<div style="grid-column:1/-1;padding:20px;text-align:center;color:#999">加载中...</div>';
            try {
                const resp = await fetch(`/api/courses/${currentWeek}`, { credentials: 'include' });
                const data = await resp.json();

                if (data.error) {
                    document.getElementById('timetable').innerHTML =
                        `<div style="grid-column:1/-1;padding:20px;text-align:center;color:red">${esc(data.error)}</div>`;
                    return;
                }

                if (data.metadata) {
                    if (currentWeek === 0) {
                        let w = data.metadata.current_week || 2;
                        if (isShareMode) {
                            w = Math.max(shareWeekMin, Math.min(shareWeekMax, w));
                        }
                        currentWeek = w;
                    }
                    if (data.metadata.max_week) maxWeek = data.metadata.max_week;
                    document.getElementById('current-week').textContent = `第${currentWeek}周`;
                }

                if (data.from_cache) {
                    const warning = document.getElementById('cache-warning');
                    warning.style.display = 'block';
                    warning.textContent = `⚠️ 教务系统连接失败，显示缓存课表（${new Date(data.cache_time).toLocaleString()}）`;
                } else {
                    document.getElementById('cache-warning').style.display = 'none';
                }

                lastCourseData = data;
                if (!isShareMode) {
                    document.getElementById('export-btn').style.display = '';
                }
                renderCourses(data);
            } catch (e) {
                document.getElementById('timetable').innerHTML =
                    '<div style="grid-column:1/-1;padding:20px;text-align:center;color:red">加载失败，请刷新重试</div>';
            }
        }

        function exportTimetable() {
            if (!lastCourseData) return;
            const json = JSON.stringify(lastCourseData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const a    = document.createElement('a');
            a.href     = URL.createObjectURL(blob);
            const dateStr = new Date().toISOString().slice(0, 10);
            a.download = `课表_第${currentWeek}周_${dateStr}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function renderCourses(data) {
            document.getElementById('meta').innerHTML =
                `${esc(data.metadata.用户)} | ${esc(data.metadata.班级)} | ${esc(data.metadata.周次)} | 更新: ${new Date(data.metadata.提取时间).toLocaleString()}`;

            const weekMap   = {'1':'周一','2':'周二','3':'周三','4':'周四','5':'周五','6':'周六','0':'周日'};
            const weekOrder = ['1','2','3','4','5','6','0'];
            const table = document.getElementById('timetable');

            // 节次对应时间；3、4节在2号教学楼/2号实训楼时间不同，此处两种均显示
            const times = {
                1:  '08:30-09:15',
                2:  '09:20-10:05',
                3:  '<span style="font-size:0.85em;line-height:1.6">2号楼<br>10:15-11:00<br><span style="opacity:0.55">其他<br>10:25-11:10</span></span>',
                4:  '<span style="font-size:0.85em;line-height:1.6">2号楼<br>11:05-11:50<br><span style="opacity:0.55">其他<br>11:15-12:00</span></span>',
                5:  '14:30-15:15',
                6:  '15:25-16:10',
                7:  '16:20-17:05',
                8:  '17:15-18:00',
                9:  '19:00-19:45',
                10: '19:55-20:40',
            };

            table.innerHTML = '<div class="cell header">节次</div>';
            weekOrder.forEach(day => {
                const dayData = data.完整课表.find(d => d.weekday === day);
                const dateStr = dayData && dayData.date ? dayData.date.slice(5) : '';
                table.innerHTML += `<div class="cell header">${weekMap[day]}<br><small>${dateStr}</small></div>`;
            });

            const occupied = {};

            for (let slot = 1; slot <= 10; slot++) {
                table.innerHTML += `<div class="cell time-slot">${slot}<br><small style="font-weight:normal">${times[slot]}</small></div>`;

                weekOrder.forEach(day => {
                    const key = `${day}-${slot}`;
                    if (occupied[key]) return;

                    const dayData = data.完整课表.find(d => d.weekday === day);
                    const course  = dayData && dayData.courses.find(c => c.time_slots.start_slot === slot);

                    if (course) {
                        const duration = course.time_slots.duration;
                        for (let i = 0; i < duration; i++) occupied[`${day}-${slot+i}`] = true;
                        table.innerHTML += `
                            <div class="cell" style="grid-row: span ${Math.max(1, Math.min(10, duration))}">
                                <div class="course">
                                    <div class="course-name">${esc(course.course_name)}</div>
                                    <div class="course-info">📍 ${esc(course.location)}</div>
                                    <div class="course-info">⏰ ${esc(course.time_slots.display)}</div>
                                    <div class="course-info">👨‍🏫 ${esc(course.teacher)}</div>
                                    ${course.weeks ? `<div class="course-info" style="opacity:0.6">${esc(course.weeks)}周</div>` : ''}
                                </div>
                            </div>`;
                    } else {
                        table.innerHTML += '<div class="cell"></div>';
                    }
                });
            }
        }

        async function init() {
            await checkAuth();
            if (!importMode) {
                loadCourses();
            }
        }

        init();
    </script>
</body>
</html>
